<!doctype html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Game Log Generator</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=Noto+Serif+KR:wght@400;500;600&display=swap');
  :root{--void:#0B1526;--void-deep:#060A14;--panel:#101B30;--gold:#C9A24A;--gold-dim:rgba(201,162,74,.35);--parchment:#E9E2CE;--parchment-dim:#9BA3B5;--think:#8C93B8}
  *{box-sizing:border-box}
  body{margin:0;padding:40px 20px 80px;background-color:var(--void);background-image:linear-gradient(160deg,var(--void) 0%,var(--void-deep) 100%);color:var(--parchment);font-family:'EB Garamond','Noto Serif KR',serif;min-height:100vh}
  .eyebrow{text-align:center;font-size:11px;letter-spacing:.35em;color:var(--gold);text-transform:uppercase;margin-bottom:8px;opacity:.8}
  .sub{text-align:center;font-size:11px;color:var(--parchment-dim);margin-bottom:36px;line-height:2}
  .sub code{background:rgba(201,162,74,.12);border:1px solid var(--gold-dim);border-radius:3px;padding:1px 6px;font-family:'Menlo','Consolas',monospace;font-size:11px;color:var(--gold)}
  .layout{max-width:1100px;margin:0 auto;display:grid;grid-template-columns:1fr 1fr;gap:22px}
  .panel{background:var(--panel);border:1px solid var(--gold-dim);border-radius:6px;padding:20px 22px 24px}
  .panel h3{margin:0 0 14px;font-size:13px;letter-spacing:.12em;text-transform:uppercase;color:var(--parchment-dim);font-weight:500}
  textarea{width:100%;background:rgba(0,0,0,.25);border:1px solid var(--gold-dim);border-radius:4px;color:var(--parchment);font-family:'Noto Serif KR',serif;font-size:14px;line-height:1.8;padding:12px 14px;resize:vertical}
  #rawInput{height:420px}
  .preview-scroll{max-height:420px;overflow-y:auto;border-radius:4px;border:1px solid var(--gold-dim)}
  .la{position:relative;padding:44px 24px 48px;background-color:var(--void);background-image:radial-gradient(rgba(233,226,206,.55) .8px,transparent 1.2px),radial-gradient(rgba(233,226,206,.34) 1px,transparent 1.4px),radial-gradient(rgba(233,226,206,.22) 1.3px,transparent 1.8px),radial-gradient(rgba(233,226,206,.15) 1.7px,transparent 2.2px),linear-gradient(160deg,var(--void) 0%,var(--void-deep) 100%);background-size:97px 131px,173px 149px,221px 197px,311px 269px,100% 100%;background-position:0 0,38px 71px,12px 140px,160px 20px,0 0;color:var(--parchment);overflow:hidden}
  .la .le{position:relative;z-index:1;padding-top:10px}
  .la .dv{display:flex;align-items:center;gap:14px;margin-bottom:28px}
  .la .dv::before,.la .dv::after{content:"";flex:1;height:1px;background:var(--gold-dim)}
  /* 미리보기 스타일 */
  .la .narr{font-size:13px;line-height:1.85;color:var(--parchment);margin:0 0 1.2em}
  .la .name-badge{font-size:11px;letter-spacing:.08em;color:#0B1526;background:var(--gold);display:inline-block;padding:2px 10px;border-radius:2px;margin:0 0 5px;font-weight:700}
  .la .name-block{margin:1.4em 0}
  .la .say-line{font-size:13px;line-height:1.4;color:var(--gold);margin:0}
  .la .choice-wrap{margin:1.4em 0}
  .la .choice-btn{display:block;width:100%;text-align:left;padding:8px 14px;background:rgba(140,147,184,.15);color:#8C93B8;border:1px solid rgba(140,147,184,.35);font-size:12px;letter-spacing:.05em;font-family:'Noto Serif KR',serif;font-weight:700;cursor:pointer;margin-bottom:4px}
  .la .choice-body{padding:12px 0 0;display:none}
  .la .choice-body.open{display:block}
  .la .cinematic{background:#060A14;padding:36px 40px;margin:1.4em 0;text-align:center}
  .la .cinematic .cline{height:1px;background:linear-gradient(90deg,transparent,rgba(201,162,74,.45),transparent)}
  .la .cinematic p{font-size:15px;line-height:2;color:var(--parchment);margin:28px 0;letter-spacing:.03em}
  .la .hint{color:var(--parchment-dim);font-style:italic}
  .output-panel{grid-column:1/-1}
  .tabs{display:flex;gap:8px;margin-bottom:14px}
  .tab{background:transparent;border:1px solid var(--gold-dim);color:var(--parchment-dim);padding:8px 14px;border-radius:4px;font-family:'Noto Serif KR',serif;font-size:13px;cursor:pointer}
  .tab.active{color:var(--void);background:var(--gold);border-color:var(--gold)}
  #outputCode{width:100%;height:220px;font-family:'Menlo','Consolas',monospace;font-size:12.5px;line-height:1.6;color:var(--parchment-dim)}
  .output-footer{display:flex;align-items:center;gap:14px;margin-top:14px}
  #copyBtn{background:var(--gold);color:#060A14;border:none;padding:10px 20px;border-radius:4px;font-family:'Noto Serif KR',serif;font-size:14px;font-weight:600;cursor:pointer}
  #copyBtn:hover{opacity:.9}
  #copyStatus{font-size:13px;color:var(--gold)}
  @media(max-width:860px){.layout{grid-template-columns:1fr}}
</style>
</head>
<body>

<div class="eyebrow">Game Log Generator</div>
<div class="sub">
  <code>@@이름@@</code> 캐릭터 이름 &nbsp;|&nbsp;
  <code>"대사"</code> 금색 대사 &nbsp;|&nbsp;
  <code>'생각'</code> 속마음 &nbsp;|&nbsp;
  <code>%%&&선택지&&</code> ~ <code>%%</code> 선택지 &nbsp;|&nbsp;
  <code>==텍스트==</code> 또는 <code>==</code>~<code>==</code> 시네마틱
</div>

<div class="layout">
  <section class="panel">
    <h3>원문 붙여넣기</h3>
    <textarea id="rawInput" placeholder="지문은 그냥 쓰면 됩니다.
줄바꿈 하나는 br, 빈 줄은 새 문단입니다.

@@캐릭터이름@@
&quot;연속 대사는 빈 줄 전까지 한 블록.&quot;
&quot;이렇게 이어서 쓰면 됩니다.&quot;

%%&&A. 선택지&&
@@캐릭터이름@@
&quot;선택지 본문&quot;
%%

==시네마틱 한 줄=="></textarea>
  </section>

  <section class="panel">
    <h3>미리보기</h3>
    <div class="preview-scroll">
      <div class="la">
        <div style="position:absolute;top:0;left:0;right:0;bottom:0;pointer-events:none;z-index:0">
          <img src="https://looliilip-pixel.github.io/galoreg/deco-top.png" style="position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover;pointer-events:none" alt="">
        </div>
        <div class="le">
          <div class="dv"><span style="color:#C9A24A;font-size:14px;line-height:1;flex-shrink:0;opacity:.85">✦</span></div>
          <div id="previewBody"><p class="hint">여기에 미리보기가 표시됩니다.</p></div>
        </div>
      </div>
    </div>
  </section>

  <section class="panel output-panel">
    <h3>생성된 코드</h3>
    <div class="tabs">
      <button class="tab active" data-mode="entry">이 로그만</button>
      <button class="tab" data-mode="full">전체 코드 (새 글)</button>
    </div>
    <textarea id="outputCode" readonly></textarea>
    <div class="output-footer">
      <button id="copyBtn">코드 복사</button>
      <span id="copyStatus"></span>
    </div>
  </section>
</div>

<script>
(function(){

var FONT='<style>@import url(\'https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=Noto+Serif+KR:wght@400;500;600&display=swap\');</style>';
var S_WRAP='position:relative;max-width:660px;margin:0 auto;padding:64px 30px 72px;background-color:#0B1526;background-image:radial-gradient(rgba(233,226,206,.55) .8px,transparent 1.2px),radial-gradient(rgba(233,226,206,.34) 1px,transparent 1.4px),radial-gradient(rgba(233,226,206,.22) 1.3px,transparent 1.8px),radial-gradient(rgba(233,226,206,.15) 1.7px,transparent 2.2px),linear-gradient(160deg,#0B1526 0%,#060A14 100%);background-size:97px 131px,173px 149px,221px 197px,311px 269px,100% 100%;background-position:0 0,38px 71px,12px 140px,160px 20px,0 0;color:#E9E2CE;font-family:\'EB Garamond\',\'Noto Serif KR\',serif;box-sizing:border-box';
var S_ENTRY='position:relative;z-index:1;padding-top:34px;margin-bottom:50px';
var S_DIV='display:flex;align-items:center;gap:14px;margin-bottom:32px';
var S_LINE='flex:1;height:1px;background:rgba(201,162,74,.35);display:block';
var S_NARR='font-size:13px;line-height:1.85;color:#E9E2CE;margin:0 0 1.2em';
var S_SAY='font-size:13px;line-height:1.4;color:#C9A24A;margin:0';
var S_NAME='font-size:11px;letter-spacing:.08em;color:#0B1526;background:#C9A24A;display:inline-block;padding:2px 10px;border-radius:2px;margin:0 0 5px;font-weight:700';
var S_NAME_WRAP='margin:1.4em 0';
var S_CHOICE_WRAP='margin:1.4em 0';
var S_CHOICE='display:block;width:100%;text-align:left;padding:8px 14px;background:rgba(140,147,184,.15);color:#8C93B8;border:1px solid rgba(140,147,184,.35);font-size:12px;letter-spacing:.05em;font-family:\'Noto Serif KR\',serif;font-weight:700;margin-bottom:4px;box-sizing:border-box';
var S_CLOSE='display:block;width:100%;text-align:right;padding:4px 14px;background:transparent;color:rgba(140,147,184,.45);border:none;font-size:10px;letter-spacing:.08em;font-family:\'Noto Serif KR\',serif;cursor:pointer;margin-top:4px;box-sizing:border-box';
var S_CIN_WRAP='background:#060A14;padding:36px 40px;margin:1.4em 0;text-align:center';
var S_CIN_LINE='height:1px;background:linear-gradient(90deg,transparent,rgba(201,162,74,.45),transparent)';
var S_CIN_P='font-size:15px;line-height:2;color:#E9E2CE;margin:28px 0;letter-spacing:.03em';

var DIV='<div style="'+S_DIV+'"><span style="'+S_LINE+'"></span><span style="color:#C9A24A;font-size:14px;line-height:1;flex-shrink:0;opacity:.85">✦</span><span style="'+S_LINE+'"></span></div>';

function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function hiInline(t){
  t=t.replace(/([\u201c"][^\u201d"]*[\u201d"])/g,'<span style="color:#C9A24A;letter-spacing:.015em">$1</span>');
  t=t.replace(/([\u2018'][^\u2019']*[\u2019'])/g,'<span style="color:#8C93B8;font-style:italic">$1</span>');
  return t;
}
function isName(l){ return /^@@.+@@$/.test(l); }
function isSay(l){ return /^[\u201c"]/.test(l); }
function isCin(l){ return l==='==' || /^==.+==/.test(l); }
function isChoiceStart(l){ return /^%%&&/.test(l) && /&&$/.test(l); }
function isChoiceEnd(l){ return l==='%%'; }

// 지문 그룹: 연속된 지문 줄들을 하나의 narr 토큰으로 (줄바꿈=br, 빈줄=새 토큰)
function tokenize(raw){
  var lines = raw.split(/\n/);
  var tokens = [];
  var i = 0;

  while(i < lines.length){
    var line = lines[i].trim();

    // 빈 줄 — 현재 지문 블록 구분 신호 (그냥 넘김)
    if(!line){ i++; continue; }

    // 시네마틱 한 줄: ==텍스트==
    if(/^==.+==/.test(line)){
      var inner = line.slice(2, line.length-2).trim();
      tokens.push({type:'cinematic', lines:[inner]});
      i++; continue;
    }
    // 시네마틱 여러 줄: ==\n...\n==
    if(line==='=='){
      var body=[];
      i++;
      while(i<lines.length && lines[i].trim()!=='=='){
        if(lines[i].trim()) body.push(lines[i].trim());
        i++;
      }
      tokens.push({type:'cinematic', lines:body});
      i++; continue;
    }

    // 선택지
    if(isChoiceStart(line)){
      var label=line.replace(/^%%&&/,'').replace(/&&$/,'').trim();
      var bodyLines=[];
      i++;
      while(i<lines.length && !isChoiceEnd(lines[i].trim())){
        bodyLines.push(lines[i]);
        i++;
      }
      tokens.push({type:'choice', label:label, lines:bodyLines});
      i++; continue;
    }

    // 이름 + 연속 대사
    if(isName(line)){
      var name=line.replace(/^@@/,'').replace(/@@$/,'');
      var sayLines=[];
      i++;
      while(i<lines.length){
        var next=lines[i].trim();
        if(!next) break;
        if(isName(next)||isCin(next)||isChoiceStart(next)) break;
        if(isSay(next)){ sayLines.push(next); i++; }
        else break;
      }
      tokens.push({type:'name', name:name, sayLines:sayLines});
      continue;
    }

    // 단독 대사 블록
    if(isSay(line)){
      var sayLines=[line]; i++;
      while(i<lines.length){
        var next=lines[i].trim();
        if(!next) break;
        if(isSay(next)){ sayLines.push(next); i++; }
        else break;
      }
      tokens.push({type:'sayblock', lines:sayLines});
      continue;
    }

    // 지문: 빈 줄 나올 때까지 br로 이어붙임
    var narrLines=[line]; i++;
    while(i<lines.length){
      var next=lines[i].trim();
      if(!next){ i++; break; } // 빈 줄 = 이 지문 블록 끝
      if(isName(next)||isSay(next)||isCin(next)||isChoiceStart(next)) break;
      narrLines.push(next); i++;
    }
    tokens.push({type:'narr', lines:narrLines});
  }
  return tokens;
}

function renderTokens(tokens, forOutput){
  var html='';
  tokens.forEach(function(tok){

    if(tok.type==='narr'){
      if(forOutput){
        html+='<p data-ke-size="size16" style="'+S_NARR+'">'+tok.lines.map(function(l){return hiInline(esc(l));}).join('<br>\n')+'</p>\n';
      } else {
        html+='<p class="narr">'+tok.lines.map(function(l){return hiInline(esc(l));}).join('<br>')+'</p>\n';
      }
    }

    else if(tok.type==='name'){
      if(forOutput){
        html+='<div style="'+S_NAME_WRAP+'">\n';
        html+='<p data-ke-size="size16" style="'+S_NAME+'">'+esc(tok.name)+'</p>\n';
        tok.sayLines.forEach(function(s){
          html+='<p data-ke-size="size16" style="'+S_SAY+'">'+hiInline(esc(s))+'</p>\n';
        });
        html+='</div>\n';
      } else {
        html+='<div class="name-block">';
        html+='<span class="name-badge">'+esc(tok.name)+'</span><br>';
        tok.sayLines.forEach(function(s){
          html+='<p class="say-line">'+hiInline(esc(s))+'</p>';
        });
        html+='</div>\n';
      }
    }

    else if(tok.type==='sayblock'){
      if(forOutput){
        html+='<div style="'+S_NAME_WRAP+'">\n';
        tok.lines.forEach(function(s){
          html+='<p data-ke-size="size16" style="'+S_SAY+'">'+hiInline(esc(s))+'</p>\n';
        });
        html+='</div>\n';
      } else {
        html+='<div class="name-block">';
        tok.lines.forEach(function(s){
          html+='<p class="say-line">'+hiInline(esc(s))+'</p>';
        });
        html+='</div>\n';
      }
    }

    else if(tok.type==='cinematic'){
      if(forOutput){
        html+='<div style="'+S_CIN_WRAP+'">\n';
        html+='<div style="'+S_CIN_LINE+'"></div>\n';
        html+='<p style="'+S_CIN_P+'">'+tok.lines.map(function(l){return hiInline(esc(l));}).join('<br>\n')+'</p>\n';
        html+='<div style="'+S_CIN_LINE+'"></div>\n';
        html+='</div>\n';
      } else {
        html+='<div class="cinematic"><div class="cline"></div><p>'+tok.lines.map(function(l){return hiInline(esc(l));}).join('<br>')+'</p><div class="cline"></div></div>\n';
      }
    }

    else if(tok.type==='choice'){
      var innerTokens=tokenize(tok.lines.join('\n'));
      var innerHtml=renderTokens(innerTokens, forOutput);
      if(forOutput){
        html+='<div style="'+S_CHOICE_WRAP+'">\n';
        html+='<div data-ke-type="moreLess" data-text-more="'+esc(tok.label)+'" data-text-less="▲"><a class="btn-toggle-moreless" style="'+S_CHOICE+'">'+esc(tok.label)+'</a><div class="moreless-content">\n';
        html+=innerHtml;
        html+='</div></div>\n';
        html+='</div>\n';
      } else {
        var id='cb'+Math.random().toString(36).slice(2,7);
        html+='<div class="choice-wrap">';
        html+='<button class="choice-btn" onclick="var b=document.getElementById(\''+id+'\');b.classList.toggle(\'open\')">'+esc(tok.label)+'</button>';
        html+='<div class="choice-body" id="'+id+'">';
        html+=innerHtml;
        html+='</div></div>\n';
      }
    }
  });
  return html;
}

function buildEntry(raw){
  var tokens=tokenize(raw);
  var body=renderTokens(tokens,true);
  return '<div style="'+S_ENTRY+'">\n'+DIV+'\n<div>\n'+body+'</div>\n</div>';
}
function buildFull(raw){
  var topImg='<img src="https://looliilip-pixel.github.io/galoreg/deco-top.png" style="position:absolute;top:0;left:0;width:660px;height:600px;pointer-events:none;z-index:0" alt="">';
  var botImg='<div style="position:relative;z-index:1;width:100%;height:60px;background-image:url(https://looliilip-pixel.github.io/galoreg/deco-bottom.png);background-size:100% 100%;background-repeat:no-repeat;margin-top:32px"></div>';
  return FONT+'\n<div style="'+S_WRAP+';min-height:600px">\n'+topImg+'\n'+buildEntry(raw)+'\n'+botImg+'\n</div>';
}

var rawInput=document.getElementById('rawInput');
var previewBody=document.getElementById('previewBody');
var outputCode=document.getElementById('outputCode');
var copyBtn=document.getElementById('copyBtn');
var copyStatus=document.getElementById('copyStatus');
var tabs=document.querySelectorAll('.tab');
var mode='entry';

function update(){
  var raw=rawInput.value.trim();
  if(!raw){previewBody.innerHTML='<p class="hint">여기에 미리보기가 표시됩니다.</p>';outputCode.value='';return;}
  previewBody.innerHTML=renderTokens(tokenize(raw),false);
  outputCode.value=mode==='entry'?buildEntry(raw):buildFull(raw);
}
rawInput.addEventListener('input',update);
tabs.forEach(function(t){
  t.addEventListener('click',function(){
    tabs.forEach(function(x){x.classList.remove('active');});
    t.classList.add('active');mode=t.dataset.mode;update();
  });
});
copyBtn.addEventListener('click',function(){
  if(!outputCode.value)return;
  navigator.clipboard.writeText(outputCode.value).then(function(){
    copyStatus.textContent='복사됐어요!';
    setTimeout(function(){copyStatus.textContent='';},2000);
  }).catch(function(){
    outputCode.select();document.execCommand('copy');
    copyStatus.textContent='복사됐어요!';
    setTimeout(function(){copyStatus.textContent='';},2000);
  });
});
try{var sv=localStorage.getItem('gameLogDraft');if(sv){rawInput.value=sv;update();}}catch(e){}
rawInput.addEventListener('input',function(){try{localStorage.setItem('gameLogDraft',rawInput.value);}catch(e){}});
update();
})();
</script>
</body>
</html>
